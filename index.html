<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Buy List</title>
    <link rel="stylesheet" href="main.css">
    <script src="main.js" defer></script>
</head>
<body>
<div class="container">
    <div class="left-column">
        <div class="add-item">
            <input type="text" placeholder="Назва товару">
            <button data-tooltip="Додати товар">Додати</button>
        </div>

        <div class="item-list"></div>
    </div>

    <div class="right-column">
        <div class="summary-section">
            <h2>Залишилося</h2>
            <div class="tags"></div>
        </div>

        <div class="summary-section">
            <h2>Куплено</h2>
            <div class="tags"></div>
        </div>
    </div>
</div>

<div class="badge">
    <div class="badge-author">
        Created by:<br>
        Nekhai Mykhailo
    </div>
    <div class="badge-title">
        Buy List
    </div>
</div>

</body>
</html>
